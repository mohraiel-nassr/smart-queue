<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartQueue Chat</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 400px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
  display: flex;
  flex-direction: column;
}

.header {
  background: #4CAF50;
  color: white;
  padding: 10px;
  text-align: center;
  border-radius: 10px 10px 0 0;
}

.messages {
  height: 300px;
  overflow-y: auto;
  padding: 10px;
}

.message {
  padding: 8px;
  margin: 5px 0;
  border-radius: 5px;
  background: #eee;
}

.me {
  background: #4CAF50;
  color: white;
  text-align: right;
}

.input-area {
  display: flex;
  border-top: 1px solid #ccc;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="chat-container">
  <div class="header">SmartQueue Chat</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("http://localhost:5000");

// 👇 غيريهم حسب التجربة
const ticketId = "123";
const senderId = Math.random().toString(36).substring(7);

// join room
socket.emit("joinTicket", ticketId);

// receive message
socket.on("receiveMessage", (data) => {
  addMessage(data.text, data.senderId === senderId);
});

// send message
function sendMessage() {
  const input = document.getElementById("msg");
  const text = input.value;

  if (!text) return;

  socket.emit("sendMessage", {
    text,
    senderId,
    ticketId
  });

  input.value = "";
}

// add message to UI
function addMessage(text, isMe) {
  const messages = document.getElementById("messages");

  const div = document.createElement("div");
  div.classList.add("message");

  if (isMe) div.classList.add("me");

  div.innerText = text;

  messages.appendChild(div);

  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
